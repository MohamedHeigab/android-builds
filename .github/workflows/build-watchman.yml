name: Build Watchman for Android ARM64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '0 0 * * 0' # Automatically run once a week

jobs:
  build:
    name: Compile Watchman for Android (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Watchman repository
        uses: actions/checkout@v4
        with:
          repository: facebook/watchman
          
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git ninja-build python3 build-essential pkg-config libssl-dev

      - name: Configure Android NDK toolchain
        run: |
          # Use the pre-installed NDK on GitHub-hosted Ubuntu runners
          NDK_TOOLCHAIN_BIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          
          mkdir -p $GITHUB_WORKSPACE/ndk-bin
          ln -s $NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang $GITHUB_WORKSPACE/ndk-bin/aarch64-linux-android-clang
          ln -s $NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang $GITHUB_WORKSPACE/ndk-bin/aarch64-linux-android-gcc
          ln -s $NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang++ $GITHUB_WORKSPACE/ndk-bin/aarch64-linux-android-clang++
          ln -s $NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang++ $GITHUB_WORKSPACE/ndk-bin/aarch64-linux-android-g++
          echo "" | base64 -d > ./build/fbcode_builder/patches/edencommon.patch
          sed -i '/\[build\]/a patchfile = edencommon.patch' ./build/fbcode_builder/manifests/edencommon
          cat << 'EOF' > ./build/fbcode_builder/manifests/openssl
          [manifest]
          name = openssl
          [download]
          url = https://www.openssl.org/source/openssl-3.0.15.tar.gz
          sha256 = 23c666d0edf20f14249b3d8f0368acaee9ab585b09e1de82107c66e1f3ec9533
          [build]
          builder = openssl
          subdir = openssl-3.0.15
          EOF
          sed -i 's/\["linux-x86_64"\] if not self.build_opts.is_arm() else \["linux-aarch64"\]/\["android-arm64"\]/' ./build/fbcode_builder/getdeps/builder.py

      - name: Build Watchman (Android ARM64)
        run: |
          # Watchman uses getdeps.py to orchestrate building its dependencies and itself
          python3 ./build/fbcode_builder/getdeps.py build --src-dir=. watchman \
            --extra-cmake-defines '{"CMAKE_TOOLCHAIN_FILE": "'$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake'", "ANDROID_ABI": "arm64-v8a", "ANDROID_PLATFORM": "android-24", "ENABLE_LIBCXX": "OFF", "HAVE_EXECINFO_H": "0", "WITH_UNWIND": "OFF", "EVENT__DISABLE_OPENSSL": "ON", "CMAKE_HAVE_LIBC_PTHREAD": "1", "CMAKE_USE_PTHREADS_INIT": "1", "CMAKE_THREAD_LIBS_INIT": "", "OQS_USE_OPENSSL": "OFF", "CMAKE_FIND_ROOT_PATH_MODE_PACKAGE": "BOTH", "CMAKE_FIND_ROOT_PATH_MODE_LIBRARY": "BOTH", "CMAKE_FIND_ROOT_PATH_MODE_INCLUDE": "BOTH", "FOLLY_HAVE_UNALIGNED_ACCESS_EXITCODE": "0", "FOLLY_HAVE_WEAK_SYMBOLS_EXITCODE": "0", "FOLLY_HAVE_LINUX_VDSO_EXITCODE": "0", "FOLLY_HAVE_WCHAR_SUPPORT_EXITCODE": "0", "HAVE_VSNPRINTF_ERRORS_EXITCODE": "0", "FOLLY_HAVE_UNALIGNED_ACCESS_EXITCODE__TRYRUN_OUTPUT": "", "FOLLY_HAVE_WEAK_SYMBOLS_EXITCODE__TRYRUN_OUTPUT": "", "FOLLY_HAVE_LINUX_VDSO_EXITCODE__TRYRUN_OUTPUT": "", "FOLLY_HAVE_WCHAR_SUPPORT_EXITCODE__TRYRUN_OUTPUT": "", "HAVE_VSNPRINTF_ERRORS_EXITCODE__TRYRUN_OUTPUT": "", "LIBRT_LIBRARY": "c", "ENABLE_EDEN_SUPPORT": "OFF", "NODE": "OFF", "YARN": "OFF"}' \
            --extra-b2-args cxxflags=-fPIC \
            --extra-b2-args cflags=-fPIC \
            --allow-system-packages
            
          # Find and strip the built watchman binary
          find . -name watchman -type f -executable -path "*/installed/watchman/bin/watchman" -exec sh -c '$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip "$1" || true' _ {} \; || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchman-android-arm64
          path: "**/installed/watchman/bin/watchman"
          if-no-files-found: warn
