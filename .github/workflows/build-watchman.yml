name: Build Watchman for aarch64 glibc (grunner/termux)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '0 0 * * 0' # Automatically run once a week

jobs:
  build:
    name: Compile Watchman (aarch64-linux-gnu)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cross-compile Watchman in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace ubuntu:22.04 /bin/bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            # Setup multiarch
            dpkg --add-architecture arm64
            sed -i -E 's/^deb (http|https)/deb [arch=amd64] \1/g' /etc/apt/sources.list
            cat <<EOF > /etc/apt/sources.list.d/arm64-ports.list
            deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse
            deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse
            deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse
            EOF
            
            apt-get update
            
            # Install build tools and cross-compiler
            apt-get install -y curl git build-essential cmake python3 python3-dev pkg-config \
                               crossbuild-essential-arm64
                               
            # Install arm64 dependencies
            apt-get install -y libssl-dev:arm64 libfmt-dev:arm64 libgflags-dev:arm64 \
                               libgoogle-glog-dev:arm64 libboost-all-dev:arm64 \
                               libevent-dev:arm64 libsnappy-dev:arm64 libzstd-dev:arm64 \
                               liblz4-dev:arm64 libsodium-dev:arm64 libdouble-conversion-dev:arm64 \
                               libgmock-dev:arm64 libgtest-dev:arm64 libfolly-dev:arm64
                               
            # Install Rust for arm64
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            export PATH=\"\$HOME/.cargo/bin:\$PATH\"
            rustup target add aarch64-unknown-linux-gnu
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            
            cd /workspace
            
            # Clone Watchman
            git clone https://github.com/facebook/watchman.git watchman-src
            cd watchman-src
            
            # Patch hardcoded paths that may fail on Termux / Android
            find . -type f -name '*.cpp' -o -name '*.h' -o -name '*.rs' | xargs sed -i 's|/var/run/watchman|/data/data/com.termux/files/usr/var/run/watchman|g'
            find . -type f -name '*.cpp' -o -name '*.h' -o -name '*.rs' | xargs sed -i 's|/usr/local/var/run/watchman|/data/data/com.termux/files/usr/var/run/watchman|g'
            find . -type f -name '*.cpp' -o -name '*.h' -o -name '*.rs' | xargs sed -i 's|\"/tmp|\"/data/data/com.termux/files/usr/tmp|g'
            
            # Aggressively remove edencommon and fb303 dependencies from CMakeLists.txt
            sed -i '/find_package(edencommon CONFIG REQUIRED)/d' CMakeLists.txt
            sed -i '/find_package(fb303 CONFIG REQUIRED)/d' CMakeLists.txt
            sed -i '/fb303::fb303/d' CMakeLists.txt
            sed -i '/edencommon::edencommon_utils/d' CMakeLists.txt
            sed -i '/edencommon::edencommon_telemetry/d' CMakeLists.txt
            
            # Create a cross-toolchain file for CMake
            cat <<EOF > arm64_toolchain.cmake
            set(CMAKE_SYSTEM_NAME Linux)
            set(CMAKE_SYSTEM_PROCESSOR aarch64)
            set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
            set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
            set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu)
            set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
            set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
            set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
            set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
            EOF
            
            # Configure Watchman build for aarch64
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE=\$PWD/arm64_toolchain.cmake \
              -DWATCHMAN_STATE_DIR=/data/data/com.termux/files/usr/var/run/watchman \
              -DENABLE_EDEN_SUPPORT=OFF \
              -DBUILD_SHARED_LIBS=OFF
              
            # Build using all available cores
            cmake --build build -j\$(nproc)
            
            # Strip debug symbols using cross-strip
            aarch64-linux-gnu-strip build/watchman
            
            # Copy artifact to the workspace
            mkdir -p ../artifacts
            cp build/watchman ../artifacts/watchman-aarch64-glibc
          "

      - name: Upload binary artifact

        uses: actions/upload-artifact@v4
        with:
          name: watchman-aarch64-glibc-termux
          path: artifacts/watchman-aarch64-glibc
          if-no-files-found: error
