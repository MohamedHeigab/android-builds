name: Build Watchman for aarch64 glibc (grunner/termux)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '0 0 * * 0' # Automatically run once a week

jobs:
  build:
    name: Compile Watchman (aarch64-linux-gnu)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cross-compile Watchman in Docker
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace ubuntu:22.04 /bin/bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            apt-get update
            apt-get install -y curl git build-essential cmake python3 python3-dev python3-pip pkg-config sudo wget libssl-dev
            
            # Install Rust for aarch64
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            export PATH=\"\$HOME/.cargo/bin:\$PATH\"
            
            cd /workspace
            
            # Clone Watchman
            git clone https://github.com/facebook/watchman.git watchman-src
            cd watchman-src
            
            # Patch hardcoded paths that may fail on Termux / Android
            find . -type f -name '*.cpp' -o -name '*.h' -o -name '*.rs' | xargs sed -i 's|/var/run/watchman|/data/data/com.termux/files/usr/var/run/watchman|g'
            find . -type f -name '*.cpp' -o -name '*.h' -o -name '*.rs' | xargs sed -i 's|/usr/local/var/run/watchman|/data/data/com.termux/files/usr/var/run/watchman|g'
            find . -type f -name '*.cpp' -o -name '*.h' -o -name '*.rs' | xargs sed -i 's|\"/tmp|\"/data/data/com.termux/files/usr/tmp|g'
            
            # Install all Facebook dependencies (folly, fizz, edencommon) via Watchman's official script
            python3 build/fbcode_builder/getdeps.py install-system-deps --recursive watchman
            
            # Build Watchman and all its dependencies
            python3 build/fbcode_builder/getdeps.py build --no-tests watchman
            
            # The binary is placed deep in a tmp directory by getdeps, copy it out
            mkdir -p ../artifacts
            find /tmp -path "*/installed/watchman/bin/watchman" -type f -executable -exec cp {} ../artifacts/watchman-aarch64-glibc \;
            
            # Strip debug symbols to reduce size
            strip ../artifacts/watchman-aarch64-glibc
          "

      - name: Upload binary artifact

        uses: actions/upload-artifact@v4
        with:
          name: watchman-aarch64-glibc-termux
          path: artifacts/watchman-aarch64-glibc
          if-no-files-found: error
