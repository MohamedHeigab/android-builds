name: Build Turso CLI for Android ARM64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '0 0 * * 0' # Automatically run once a week

jobs:
  build:
    name: Compile Turso CLI for Android (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Turso CLI repository
        uses: actions/checkout@v4
        with:
          repository: tursodatabase/turso-cli
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true

      - name: Configure Android NDK toolchain
        run: |
          # Use the pre-installed NDK on GitHub-hosted Ubuntu runners
          NDK_TOOLCHAIN_BIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$NDK_TOOLCHAIN_BIN" >> $GITHUB_PATH

      - name: Build Turso CLI
        working-directory: cmd/turso
        env:
          CGO_ENABLED: 1
          GOOS: android
          GOARCH: arm64
          CC: aarch64-linux-android21-clang
        run: |
          go build -v -trimpath -ldflags="-s -w" -o turso-android-arm64 .
          
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: turso-android-arm64
          path: cmd/turso/turso-android-arm64
          if-no-files-found: error
