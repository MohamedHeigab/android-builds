name: Build RustFS for Android ARM64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    - cron: '0 0 * * 0' # Automatically run once a week

jobs:
  build:
    name: Compile RustFS for Android (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RustFS repository
        uses: actions/checkout@v4
        with:
          repository: rustfs/rustfs
          
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Configure Android NDK toolchain
        run: |
          # Use the pre-installed NDK on GitHub-hosted Ubuntu runners
          NDK_TOOLCHAIN_BIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          
          # Inform Cargo about the Android linker and C compiler wrapper
          # API level 24 is widely compatible for modern Android devices
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$NDK_TOOLCHAIN_BIN/aarch64-linux-android24-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK_TOOLCHAIN_BIN/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=$NDK_TOOLCHAIN_BIN/llvm-ranlib" >> $GITHUB_ENV
          
          # Add the NDK bin directory to the PATH so build scripts can find other tools
          echo "$NDK_TOOLCHAIN_BIN" >> $GITHUB_PATH

      - name: Patch Cargo.toml for Android CLI compatibility
        run: |
          # Replace 'rustls' with 'native-tls-vendored' to avoid 'rustls-platform-verifier'
          # which panics on Android when run without a JNI context (e.g. in Termux).
          sed -i 's/"rustls"/"native-tls-vendored"/g' Cargo.toml
          sed -i 's/"reqwest-rustls"/"reqwest-client"/g' Cargo.toml

      - name: Build RustFS
        run: |
          cargo build --release --target aarch64-linux-android
          
          # Strip debug symbols to drastically reduce the binary size
          $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip target/aarch64-linux-android/release/rustfs
          
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustfs-android-arm64
          path: target/aarch64-linux-android/release/rustfs
          if-no-files-found: error
